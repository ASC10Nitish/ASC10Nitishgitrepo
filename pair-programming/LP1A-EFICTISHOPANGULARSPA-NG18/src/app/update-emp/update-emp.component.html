<div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg border-0 rounded p-4">
          <h2 class="text-center text-primary mb-4">Update Employee</h2>
          <form (ngSubmit)="updateEmployee()">
            
            <div class="form-group">
              <label for="id" class="font-weight-bold text-secondary">Employee ID</label>
              <input type="text" class="form-control form-control-lg" [(ngModel)]="employee.id" name="id" required placeholder="Enter employee ID" />
            </div>
            
            <div class="form-group">
              <label for="name" class="font-weight-bold text-secondary">Employee Name</label>
              <input type="text" class="form-control form-control-lg" [(ngModel)]="employee.name" name="name" required placeholder="Enter employee name" />
            </div>
            
            <div class="form-group">
              <label for="salary" class="font-weight-bold text-secondary">Employee Salary</label>
              <input type="text" class="form-control form-control-lg" [(ngModel)]="employee.salary" name="salary" required placeholder="Enter employee salary" />
            </div>
            
            <button type="submit" class="btn btn-primary btn-block py-2 mt-3"  (click)="onSubmit()">Update Employee</button>
          </form>
        </div>
      </div>
    </div>
  </div>
