       <div class="container">
        <h4 class="text-center mb-4">Login Form</h4> <!-- Added class text-center for alignment -->
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
            <!-- Login ID Field -->
            <div class="form-group">
                <label for="loginid">Login ID</label>
                <input type="text" id="loginid" formControlName="loginid" class="form-control"
                    [ngClass]="{'is-invalid': loginForm.controls['loginid'].errors, 
                                'boldItalicError': loginForm.controls['loginid'].errors}">
                
                <!-- Validation Message for Login ID -->
                <div *ngIf="loginForm.controls['loginid'].errors" class="invalid-feedback boldItalicError">
                    <div *ngIf="loginForm.controls['loginid'].errors?.['required']">
                        Login ID is required
                    </div>
                </div>
            </div>
    
            <!-- Password Field -->
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" formControlName="password" class="form-control"
                    [ngClass]="{'is-invalid': loginForm.controls['password'].errors,
                                'boldItalicError': loginForm.controls['password'].errors}">
                
                <!-- Validation Message for Password -->
                <div *ngIf="loginForm.controls['password'].errors" class="invalid-feedback boldItalicError">
                    <div *ngIf="loginForm.controls['password'].errors?.['required']">
                        Password is required
                    </div>
                </div>
            </div>
    
            <!-- Submit Button -->
            <div class="text-center">
                <button type="submit" class="btn btn-success btn-lg">Login</button>
            </div>
        </form>
    </div>
