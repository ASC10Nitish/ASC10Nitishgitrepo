<!-- appointments.component.html -->
<div class="container my-5">
  <div class="d-flex justify-content-end mb-4">
    <button mat-raised-button color="primary" type="button" class="me-2" (click)="addAppointment()">Add Appointment</button>
    <button mat-raised-button color="accent" type="button" class="me-2" style="color:black;" (click)="back()">Back</button>
    <button mat-raised-button color="warn" type="button" style="width: 150px;" (click)="logout()">Logout</button>
  </div>
  
    <h3 class="heading text-center mb-4">Appointment List</h3>
  
    <div class="mb-4 d-flex justify-content-between align-items-center">
      <div class="input-group w-50">
        <input type="text" [(ngModel)]="searchInput" name="searchInput" placeholder="Search by ID">
        <button type="button" (click)="searchAppointments()" class="btn btn-info">Search</button>
      </div>
    </div>
  
    <div class="table-responsive">
      <table class="table table-hover table-striped table-bordered" style="width: 100%;">
        <thead class="thead-dark">
          <tr>
            <th>Appointment ID</th>
            <th>Doctor Name</th>
            <th>Patient Name</th>
            <th>Appointment Date</th>
            <th>Time</th>
            <th>Reason</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let appointment of appointments" class="align-middle">
            <td>{{appointment.appointment_id}}</td>
            <td>{{appointment.doctor_name}}</td>
            <td>{{appointment.patient_name}}</td>
            <td>{{appointment.appointment_date | date}}</td>
            <td>{{appointment.time}}</td>
            <td>{{appointment.reason}}</td>
            <td class="d-flex justify-content-around">
              <button (click)="deleteAppointment(appointment)" class="btn btn-danger btn-sm">Delete</button>
              <button (click)="updateAppointment(appointment.appointment_id)" class="btn btn-warning btn-sm">Update</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
