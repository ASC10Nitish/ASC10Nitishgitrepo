<div class="container mt-5">
    <h4 class="text-center mb-4 text-primary font-weight-bold">ADMIN REGISTRATION</h4>
   
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
   
      <!-- Email Field -->
      <div class="form-group mb-3">
        <label for="email" class="font-weight-bold">Email</label>
        <input
          type="email"
          formControlName="email"
          id="email"
          class="form-control"
          placeholder="Enter your email"
          [ngClass]="{ 'is-invalid': submitted && f['email'].errors }" />
        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
          <div *ngIf="f['email'].errors?.['required']">Email is required</div>
          <div *ngIf="f['email'].errors?.['email']">Invalid email format</div>
          <div *ngIf="f['email'].errors?.['maxlength']">Email cannot exceed 50 characters</div>
        </div>
      </div>
   
      <!-- Password Field -->
      <div class="form-group mb-3">
        <label for="password" class="font-weight-bold">Create Password</label>
        <input
          type="password"
          formControlName="password"
          id="password"
          class="form-control"
          placeholder="Enter your password"
          [ngClass]="{ 'is-invalid': submitted && f['password'].errors }" />
        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
          <div *ngIf="f['password'].errors?.['required']">Password is required</div>
          <div *ngIf="f['password'].errors?.['minlength']">Password must be at least 8 characters</div>
        </div>
      </div>
   
      <!-- Confirm Password Field -->
      <div class="form-group mb-3">
        <label for="confirmPassword" class="font-weight-bold">Re-Enter Password</label>
        <input
          type="password"
          formControlName="confirmPassword"
          id="confirmPassword"
          class="form-control"
          placeholder="Re-enter your password"
          [ngClass]="{ 'is-invalid': submitted && f['confirmPassword'].errors }" />
        <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
          <div *ngIf="f['confirmPassword'].errors?.['required']">Password confirmation is required</div>
          <div *ngIf="f['confirmPassword'].errors?.['passwordMismatch']">Passwords do not match</div>
        </div>
      </div>
   
      <!-- Buttons -->
      <div class="form-group d-flex justify-content-between">
        <button type="submit" routerLink="login" class="btn btn-primary">Register</button>
        <button type="reset" class="btn btn-warning">Reset</button>
      </div>
   
    </form>
  </div>
