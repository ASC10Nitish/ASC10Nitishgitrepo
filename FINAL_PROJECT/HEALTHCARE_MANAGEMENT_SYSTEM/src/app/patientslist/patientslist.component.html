
<div class="container my-5">
    
    <div class="d-flex justify-content-end mb-4">
        <button mat-raised-button color="primary" type="button" class="me-2" (click)="addPatient()">Add Patient</button>
        <button mat-raised-button color="accent" type="button" class="me-2" style="color:black;" (click)="back()">Back</button>
        <button mat-raised-button color="warn" type="button" style="width: 150px;" (click)="logout()">Logout</button>
      </div>
  
    <h3 class="heading text-center mb-4">Patient List</h3>
  
   
    <div class="mb-4 d-flex justify-content-between align-items-center">
        <div class="input-group w-50">
            <input type="text" [(ngModel)]="searchInput" name="searchInput" placeholder="Search by ID">
            <button type="button" (click)="searchPatients()" class="btn btn-info">Search</button>
        </div>
    </div>
  
  
    <div class="table-responsive">
        <table class="table table-hover table-striped table-bordered" style="width: 100%;">
            <thead class="thead-dark">
                <tr>
                    <th>Patient ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Date of Birth</th>
                    <th>Gender</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                
                <tr *ngFor="let patient of patients" class="align-middle">
                    <td>{{patient.patient_id}}</td>
                    <td>{{patient.first_name}}</td>
                    <td>{{patient.last_name}}</td>
                    <td>{{patient.email}}</td>
                    <td>{{patient.phone}}</td>
                    <td>{{patient.dob | date:'MM/dd/yyyy'}}</td>
                    <td>{{patient.gender}}</td>
                    <td class="d-flex justify-content-around">
                        
                        <button (click)="deletePatient(patient)" class="btn btn-danger btn-sm">Delete</button>
                        <button (click)="updatePatient(patient.patient_id)" class="btn btn-warning btn-sm">Update</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
