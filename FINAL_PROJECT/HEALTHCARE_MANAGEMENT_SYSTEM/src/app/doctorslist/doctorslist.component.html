<div class="container my-5">
    <div class="d-flex justify-content-end mb-4">
      <button type="button" (click)="logout()" class="btn btn-primary btn-lg" style="width: 150px;">Logout</button>
      <button type="button" class="btn btn-warning btn-sm" (click)="addDoctor()">Add Doctor</button>
    </div>
  
    <h3 class="heading text-center mb-4">Doctor List</h3>
  
    <div class="mb-4 d-flex justify-content-between align-items-center">
      <div class="input-group w-50">
        <input type="text" [(ngModel)]="searchInput" name="searchInput" placeholder="Search by ID">
        <button type="button" (click)="searchDoctors()" class="btn btn-info">Search</button>
      </div>
    </div>
  
    <div class="table-responsive">
      <table class="table table-hover table-striped table-bordered" style="width: 100%;">
        <thead class="thead-dark">
          <tr>
            <th>Doctor ID</th>
            <th>Name</th>
            <th>Specialty</th>
            <th>Contact Number</th>
            <th>Email</th>
            <th>Experience</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let doctor of doctors" class="align-middle">
            <td>{{doctor.doctor_id}}</td>
            <td>{{doctor.name}}</td>
            <td>{{doctor.specialty}}</td>
            <td>{{doctor.contact_number}}</td>
            <td>{{doctor.email}}</td>
            <td>{{doctor.experience}}</td>
            <td class="d-flex justify-content-around">
              <button (click)="deleteDoctor(doctor)" class="btn btn-danger btn-sm">Delete</button>
              <button (click)="updateDoctor(doctor.doctor_id)" class="btn btn-warning btn-sm">Update</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
