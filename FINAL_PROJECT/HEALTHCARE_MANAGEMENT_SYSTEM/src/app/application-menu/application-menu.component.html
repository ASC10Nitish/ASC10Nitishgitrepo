<div class="container mt-5">
    
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow-lg">
          <div class="card-body">
            <div class="text-center">
             
              <h3 class="card-title mb-3">Welcome to Your Healthcare Dashboard</h3>
              
              <p class="card-text mb-4">Select from the options below to manage and explore healthcare services:</p>
            </div>
            <div class="d-grid gap-3">
              
              <button class="btn btn-warning btn-lg" (click)="navigateToHospitals()">Hospitals</button>
              <button class="btn btn-info btn-lg" (click)="navigateToAppointments()">Appointments</button>
              <button class="btn btn-primary btn-lg" (click)="navigateToDoctors()">Doctors</button>
              <button class="btn btn-success btn-lg" (click)="navigateToPatients()">Patients</button>
              <button class="btn btn-warning btn-lg" (click)="navigateToReviews()">Reviews</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
