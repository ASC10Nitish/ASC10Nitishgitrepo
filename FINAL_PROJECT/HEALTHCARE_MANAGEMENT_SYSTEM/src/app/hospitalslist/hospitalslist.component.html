<div class="container my-5">
  <div class="d-flex justify-content-end mb-4">
    <button mat-raised-button color="primary" type="button" class="me-2" (click)="addHospital()">Add Hospital</button>
    <button mat-raised-button color="accent" type="button" class="me-2" style="color:black;" (click)="back()">Back</button>
    <button mat-raised-button color="warn" type="button" style="width: 150px;" (click)="logout()">Logout</button>
  </div>
  
  
    <h3 class="heading text-center mb-4">Hospital List</h3>
  
    <div class="mb-4 d-flex justify-content-between align-items-center">
      <div class="input-group w-50">
        <input type="text" [(ngModel)]="searchInput" name="searchInput" placeholder="Search by ID">
        <button type="button" (click)="searchHospitals()" class="btn btn-info">Search</button>
      </div>
    </div>
  
    <div class="table-responsive">
      <table class="table table-hover table-striped table-bordered" style="width: 100%;">
        <thead class="thead-dark">
          <tr>
            <th>Hospital ID</th>
            <th>Hospital Name</th>
            <th>Address</th>
            <th>Contact Number</th>
            <th>Email</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let hospital of hospitals" class="align-middle">
            <td>{{hospital.hospital_id}}</td>
            <td>{{hospital.hospital_name}}</td>
            <td>{{hospital.address}}</td>
            <td>{{hospital.contact_number}}</td>
            <td>{{hospital.email}}</td>
            <td class="d-flex justify-content-around">
              <button (click)="deleteHospital(hospital)" class="btn btn-danger btn-sm">Delete</button>
              <button (click)="updateHospital(hospital.hospital_id)" class="btn btn-warning btn-sm">Update</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
