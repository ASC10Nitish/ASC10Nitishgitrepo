<div class="container my-5">
    <div class="d-flex justify-content-end mb-4">
      <button type="button" (click)="logout()" class="btn btn-primary btn-lg" style="width: 150px;">Logout</button>
      <button type="button" class="btn btn-warning btn-sm" (click)="addHospital()">Add Hospital</button>
    </div>
  
    <h3 class="heading text-center mb-4">Hospital List</h3>
  
    <div class="mb-4 d-flex justify-content-between align-items-center">
      <div class="input-group w-50">
        <input type="text" [(ngModel)]="searchInput" name="searchInput" placeholder="Search by ID">
        <button type="button" (click)="searchHospitals()" class="btn btn-info">Search</button>
      </div>
    </div>
  
    <div class="table-responsive">
      <table class="table table-hover table-striped table-bordered" style="width: 100%;">
        <thead class="thead-dark">
          <tr>
            <th>Hospital ID</th>
            <th>Name</th>
            <th>Address</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let hospital of hospitals" class="align-middle">
            <td>{{hospital.hospital_id}}</td>
            <td>{{hospital.name}}</td>
            <td>{{hospital.address}}</td>
            <td>{{hospital.phone}}</td>
            <td>{{hospital.email}}</td>
            <td class="d-flex justify-content-around">
              <button (click)="deleteHospital(hospital)" class="btn btn-danger btn-sm">Delete</button>
              <button (click)="updateHospital(hospital.hospital_id)" class="btn btn-warning btn-sm">Update</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
