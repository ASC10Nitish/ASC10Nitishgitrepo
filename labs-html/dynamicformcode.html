<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        table {
            width: 40%; 
            border-collapse: collapse;
        }
        th, td {
            border: 2px solid black;
            padding: 10px;
            text-align: center;
            height: 50px;
        }
    </style>
</head>
<body style="background-color: bisque;">
    <h1 style="margin-left: 100px; text-decoration: underline;">REGISTRATION FORM</h1>
    <h2><div id="b" style="margin-left: 800px; text-decoration: underline;">Static Dashboard</div></h2>

    <form id="myform" style="text-align: left; 
        border: 3px solid black;
        padding: 50px;
        color: brown;
        text-shadow: 4px 4px 6px #888888;
        width: 400px;
        margin-left: 100px;
        background-color:gainsboro;
        border-radius: 20px;">

        ENTER YOUR NAME: <input type="text" id="NAME">
        <br><br>

        ENTER YOUR PASSWORD: <input type="password" id="PASSWORD">
        <br><br>

        GENDER:
        <br><br>
        <input type="radio" name="gender" value="MALE" id="male"> MALE
        <input type="radio" name="gender" value="FEMALE" id="female"> FEMALE
        <br><br>

        MODE OF PAYMENT:
        <select id="paymentMode">
            <option value="CREDITCARD">CREDITCARD</option>
            <option value="DEBITCARD">DEBITCARD</option>
        </select>
        <br><br>

        <div style="text-align: center;">
            <button type="submit" style="background-color: brown; color: antiquewhite;">SUBMIT</button>
        </div>
        <br><br>
    </form>

    <table border="1" id="dataTable" style="margin-left: 700px; margin-top: -350px;">
        <thead>
            <tr>
                <th>NAME</th>
                <th>PASSWORD</th>
                <th>GENDER</th>
                <th>MODE OF PAYMENT</th>
            </tr>    
        </thead> 
        <tbody>
        
        </tbody> 
    </table>    

    <script>
        
        const nameInput = document.getElementById('NAME');
        const passwordInput = document.getElementById('PASSWORD');
        const genderInputs = document.querySelectorAll('input[name="gender"]');
        const paymentModeSelect = document.getElementById('paymentMode');
        const tableBody = document.getElementById('dataTable').getElementsByTagName('tbody')[0];

      
        function updateTable() {
            
            const name = nameInput.value;
            const password = passwordInput.value;
            const gender = Array.from(genderInputs).find(input => input.checked)?.value || '';
            const paymentMode = paymentModeSelect.value;

            
            tableBody.innerHTML = '';

            const newRow = tableBody.insertRow();
            const cell1 = newRow.insertCell(0);
            const cell2 = newRow.insertCell(1);
            const cell3 = newRow.insertCell(2);
            const cell4 = newRow.insertCell(3);

            cell1.textContent = name;
            cell2.textContent = password;
            cell3.textContent = gender;
            cell4.textContent = paymentMode;
        }

        
        nameInput.addEventListener('input', updateTable);
        passwordInput.addEventListener('input', updateTable);
        genderInputs.forEach(input => input.addEventListener('change', updateTable));
        paymentModeSelect.addEventListener('change', updateTable);
    </script>

</body>
</html>
